[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

; This chip has 4 MB flash (not 8 MB as the devkitc-1-N8 default assumes).
board_build.flash_size = 4MB
board_upload.flash_size = 4MB
board_build.flash_mode = dio
board_build.partitions = default.csv

; USB mode=0 = TinyUSB — required for USBMSC.
; CDC_ON_BOOT=1: Serial goes through TinyUSB CDC so we keep USB serial debugging.
; OPI PSRAM (2MB AP_3v3 embedded) needs qio_opi memory type
board_build.arduino.memory_type = qio_opi

build_flags =
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.5
    greiman/SdFat@^2.2.3
