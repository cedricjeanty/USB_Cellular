[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*

# Register custom marks so pytest doesn't warn about unknown ones
markers =
    hardware:   requires Pi hardware – pass --pi-host USER@HOST to enable
    cellular:   requires active SIM / cellular bearer – pass --cellular to enable
    disruptive: briefly unloads the USB gadget – pass --disruptive to enable
    usb_cable:  Pi must be connected via USB cable – pass --usb-device /dev/sdX to enable
    slow:       test takes more than 30 s

# Default: be verbose, show local variables on failure
addopts = -v --tb=short
